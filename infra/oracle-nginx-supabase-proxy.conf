# Phase 8.6 Phase 2 — RU-reachable Supabase proxy.
#
# Place at: /etc/nginx/sites-available/supabase-proxy
# Symlink:  ln -s /etc/nginx/sites-available/supabase-proxy /etc/nginx/sites-enabled/
# Reload:   nginx -t && systemctl reload nginx
#
# Deployed on an Oracle Cloud Always-Free Ampere A1 instance in eu-frankfurt-1.
# nginx fronts api.bystrobarista.com and reverse-proxies to the same Supabase
# project (zifvfsamfzepxxuxhyhg.supabase.co). SNI + Host header are rewritten
# upstream so the Supabase edge accepts the request as if it came in directly.
# The /realtime/v1/* location upgrades to WebSocket for live chat.

upstream supabase_upstream {
    server zifvfsamfzepxxuxhyhg.supabase.co:443;
    keepalive 32;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl http2;
    server_name api.bystrobarista.com;

    # Supabase Storage uploads (branch/portfolio photos, business logos) hit
    # this proxy as POST/PUT bodies. nginx's 1 MB default would 413 anything
    # above ~1 MB, which a fresh JPEG camera shot at 2000px-cap routinely
    # exceeds. Match the app-side MAX_PHOTO_BYTES (7 MB) with headroom.
    client_max_body_size 10m;

    ssl_certificate     /etc/letsencrypt/live/api.bystrobarista.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bystrobarista.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Realtime WebSocket — Phoenix Channels heartbeat every 30s, long-lived
    # connection. Disable buffering and stretch read timeouts so quiet
    # connections aren't reaped mid-session.
    location ~ ^/realtime/v1/ {
        proxy_pass https://supabase_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host zifvfsamfzepxxuxhyhg.supabase.co;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_server_name on;
        proxy_ssl_name zifvfsamfzepxxuxhyhg.supabase.co;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # REST / Auth (GoTrue) / Storage / Functions.
    location / {
        proxy_pass https://supabase_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host zifvfsamfzepxxuxhyhg.supabase.co;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_server_name on;
        proxy_ssl_name zifvfsamfzepxxuxhyhg.supabase.co;
        proxy_pass_request_headers on;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }
}

server {
    listen 80;
    server_name api.bystrobarista.com;
    return 301 https://$host$request_uri;
}
