# Russia-reachable proxy for the marketing site (bystrobarista.com).
#
# Place at: /etc/nginx/sites-available/website-proxy
# Symlink:  ln -s /etc/nginx/sites-available/website-proxy /etc/nginx/sites-enabled/
# Reload:   nginx -t && systemctl reload nginx
#
# Lives on the same Time4VPS/RackRay Lithuania VM (185.81.166.243) that fronts
# api.bystrobarista.com — see oracle-nginx-supabase-proxy.conf. (Filename kept
# for git history; we no longer run on Oracle Frankfurt.) The marketing site
# is hosted on Vercel, which is intermittently blocked by RKN — this server
# block lets RU users reach bystrobarista.com through the LT VM.
#
# DNS prerequisite: bystrobarista.com (and www) A-record points at the VM's
# public IP, NOT at Vercel's edge. Vercel routes by Host header, so once the
# upstream request lands at Vercel with `Host: bystrobarista.com` the right
# deployment is served. Keep the domain attached to the Vercel project so its
# cert/edge routing stays valid for direct hits (e.g. from non-RU users via
# Vercel's own DNS once they remove A-record after migration — currently both
# co-exist while we measure).

resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
resolver_timeout 5s;

server {
    listen 443 ssl http2;
    server_name bystrobarista.com www.bystrobarista.com;

    ssl_certificate     /etc/letsencrypt/live/bystrobarista.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bystrobarista.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Vercel routes custom-domain traffic by the inbound Host header — keep the
    # user's original $host so the right project deployment is served. The
    # CNAME target rotates IPs on Vercel's side, which is why we resolve in a
    # variable + use a recursive resolver above (otherwise nginx caches the IP
    # at startup and stops working when Vercel changes edges).
    set $vercel_upstream "cname.vercel-dns.com";

    location / {
        proxy_pass https://$vercel_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP $remote_addr;

        # SNI must match the public domain (bystrobarista.com), not the CNAME —
        # Vercel picks the cert by SNI and would otherwise hand us
        # cname.vercel-dns.com's cert.
        proxy_ssl_server_name on;
        proxy_ssl_name $host;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffering off;
    }
}

server {
    listen 80;
    server_name bystrobarista.com www.bystrobarista.com;
    return 301 https://$host$request_uri;
}
